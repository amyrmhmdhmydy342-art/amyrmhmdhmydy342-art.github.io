    <title>پروکسی</title>
    <script>
        // گرفتن مسیر کامل (مثلاً /proxy/youtube.com)
        var fullPath = window.location.pathname + window.location.search;
        
        // آدرس پروکسی Vercel خودت
        var target = 'https://my-cool-proxy1.vercel.app' + fullPath;
        
        // هدایت
